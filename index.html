<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>竞品新游雷达</title>
<style>
  :root{
    --bg:#f5f5f7; --card:#fff; --ink:#1d1d1f; --sub:#6e6e73;
    --line:#d2d2d7; --accent:#0071e3; --soft:#f5f5f7;
    --ios:#0a84ff; --android:#1d8a44; --soft-tag:#c2410c;
  }
  *{box-sizing:border-box}
  body{
    margin:0;min-height:100vh;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
    padding:40px 20px;
  }
  .wrap{max-width:760px;margin:0 auto}
  .title{font-size:30px;font-weight:700;letter-spacing:-.02em;margin:0 0 4px}
  .meta{color:var(--sub);font-size:13px;margin:0 0 22px}
  .bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:22px}
  .seg{display:inline-flex;background:#e9e9ec;border-radius:10px;padding:3px}
  .seg button{border:0;background:transparent;padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;color:var(--sub);cursor:pointer}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08)}
  select,input{font:inherit;font-size:13px;padding:7px 10px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink)}
  input{flex:1;min-width:140px}
  .daygroup{margin-bottom:26px}
  .dayhead{font-size:13px;font-weight:700;color:var(--sub);margin:0 0 10px;position:sticky;top:0;background:var(--bg);padding:4px 0}
  .game{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:16px 18px;margin-bottom:10px;box-shadow:0 1px 2px rgba(0,0,0,.03);
  }
  .g-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .plat{font-size:12px;font-weight:700;padding:2px 8px;border-radius:6px;color:#fff}
  .plat.ios{background:var(--ios)}
  .plat.android{background:var(--android)}
  .dev{font-size:12px;font-weight:600;color:var(--accent);background:#eaf3ff;padding:2px 8px;border-radius:6px}
  .found{font-size:12px;color:var(--sub);background:var(--soft);border:1px solid var(--line);padding:2px 8px;border-radius:6px}
  .tag{font-size:12px;font-weight:600;padding:2px 8px;border-radius:6px}
  .tag.soft{color:#fff;background:var(--soft-tag)}
  .tag.live{color:var(--android);background:#e9f6ee}
  .g-name{font-size:17px;font-weight:600;margin:10px 0 6px;line-height:1.3}
  .g-name a{color:var(--ink);text-decoration:none}
  .g-name a:hover{color:var(--accent)}
  .g-info{font-size:13px;color:var(--sub);line-height:1.7}
  .g-info b{color:var(--ink);font-weight:600}
  .empty{text-align:center;color:var(--sub);padding:60px 20px;font-size:15px}
  .count{font-size:13px;color:var(--sub);margin-left:auto}
</style>
</head>
<body>
<div class="wrap">
  <h1 class="title">📡 竞品新游雷达</h1>
  <p class="meta" id="meta">加载中…</p>

  <div class="bar">
    <div class="seg" id="platSeg">
      <button data-p="all" class="on">全部</button>
      <button data-p="iOS">🍎 iOS</button>
      <button data-p="Android">🤖 Android</button>
    </div>
    <select id="devSel"><option value="all">全部厂商</option></select>
    <select id="sortSel">
      <option value="found_desc">最近发现 ↓</option>
      <option value="rel_desc">上架时间 ↓（新→旧）</option>
      <option value="rel_asc">上架时间 ↑（旧→新）</option>
      <option value="dev_az">厂商 A→Z</option>
      <option value="name_az">游戏名 A→Z</option>
    </select>
    <input id="search" type="search" placeholder="搜索游戏名…">
    <span class="count" id="count"></span>
  </div>

  <div id="list"></div>
</div>

<script>
let GAMES = [];
let filter = { plat:"all", dev:"all", q:"", sort:"found_desc" };

const parseTs = s => { const t = Date.parse(s); return isNaN(t) ? null : t; };
const SORTERS = {
  found_desc: (a,b) => (b.found_date||"").localeCompare(a.found_date||"") || (a.developer||"").localeCompare(b.developer||""),
  rel_desc:   (a,b) => ((parseTs(b.release_date) ?? -Infinity) - (parseTs(a.release_date) ?? -Infinity)),
  rel_asc:    (a,b) => ((parseTs(a.release_date) ?? Infinity) - (parseTs(b.release_date) ?? Infinity)),
  dev_az:     (a,b) => (a.developer||"").localeCompare(b.developer||"") || (b.found_date||"").localeCompare(a.found_date||""),
  name_az:    (a,b) => (a.name||"").localeCompare(b.name||""),
};

const esc = s => String(s||"").replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function regionTag(regions){
  const live = (regions||[]).map(r=>r.toLowerCase()).includes("us");
  return live
    ? '<span class="tag live">✅ US 上架</span>'
    : '<span class="tag soft">🔥 Soft Launch</span>';
}

function render(){
  const list = document.getElementById('list');
  let rows = GAMES.filter(g =>
    (filter.plat==="all" || g.platform===filter.plat) &&
    (filter.dev==="all"  || g.developer===filter.dev) &&
    (!filter.q || (g.name||"").toLowerCase().includes(filter.q))
  );
  document.getElementById('count').textContent = rows.length ? rows.length + " 款" : "";

  if(!rows.length){
    list.innerHTML = '<div class="empty">😴 没有符合条件的新游</div>';
    return;
  }

  rows = rows.slice().sort(SORTERS[filter.sort] || SORTERS.found_desc);

  list.innerHTML = rows.map(g => `
    <div class="game">
      <div class="g-top">
        <span class="plat ${g.platform==='iOS'?'ios':'android'}">${g.platform==='iOS'?'🍎 iOS':'🤖 Android'}</span>
        <span class="dev">${esc(g.developer)}</span>
        ${regionTag(g.regions)}
        <span class="found">🔎 发现 ${esc(g.found_date||"—")}</span>
      </div>
      <div class="g-name"><a href="${esc(g.url)}" target="_blank" rel="noopener">${esc(g.name)}</a></div>
      <div class="g-info">
        🌍 ${esc((g.regions||[]).map(r=>r.toUpperCase()).join(", "))}
        &nbsp;·&nbsp; 📦 <b>${esc(g.size||"—")}</b>
        &nbsp;·&nbsp; 💰 ${esc(g.iap_info||"—")}
        &nbsp;·&nbsp; 🗓 上架 <b>${esc(g.release_date||"—")}</b>
      </div>
    </div>
  `).join('');
}

function buildDevOptions(){
  const devs = [...new Set(GAMES.map(g=>g.developer))].sort();
  const sel = document.getElementById('devSel');
  devs.forEach(d => {
    const o = document.createElement('option'); o.value=d; o.textContent=d; sel.appendChild(o);
  });
}

document.getElementById('platSeg').addEventListener('click', e => {
  if(e.target.tagName!=='BUTTON') return;
  [...e.currentTarget.children].forEach(b=>b.classList.remove('on'));
  e.target.classList.add('on');
  filter.plat = e.target.dataset.p; render();
});
document.getElementById('devSel').addEventListener('change', e => { filter.dev = e.target.value; render(); });
document.getElementById('sortSel').addEventListener('change', e => { filter.sort = e.target.value; render(); });
document.getElementById('search').addEventListener('input', e => { filter.q = e.target.value.toLowerCase().trim(); render(); });

fetch('data.json?_=' + Date.now())
  .then(r => r.json())
  .then(data => {
    GAMES = data.games || [];
    document.getElementById('meta').textContent =
      `共监控中 · 最近 120 天发现 ${GAMES.length} 款新游 · 数据更新于 ${data.updated_at || "—"}（每天自动）`;
    buildDevOptions();
    render();
  })
  .catch(() => {
    document.getElementById('meta').textContent = '⚠️ 暂无数据（首次运行后会自动生成 data.json）';
    document.getElementById('list').innerHTML = '<div class="empty">等待首次自动抓取…</div>';
  });
</script>
</body>
</html>
